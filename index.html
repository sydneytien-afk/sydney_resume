<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sydney TIEN | Senior Financial Leader & Web3 Strategist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap');
        
        :root {
            --bg-dark: #020617;
            --accent-blue: #38bdf8;
            --accent-purple: #818cf8;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark);
        }

        .font-heading { font-family: 'Space Grotesk', sans-serif; }

        /* AI 潮流感：動態流體背景 */
        .hero-glow {
            position: absolute;
            top: -10%;
            right: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(129, 140, 248, 0.05) 50%, transparent 80%);
            filter: blur(60px);
            z-index: 0;
            pointer-events: none;
        }

        /* 磨砂玻璃卡片 */
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.1);
            transform: translateY(-4px);
        }

        /* 漸層文字 */
        .text-gradient {
            background: linear-gradient(135deg, #f8fafc 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 時間軸線條 */
        .timeline-line {
            background: linear-gradient(to bottom, #38bdf8, #818cf8, transparent);
        }
    </style>
</head>
